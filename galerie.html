<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galerie photo | La Musarde</title>
<link rel="stylesheet" href="style.css" />

<style>

/* HERO */
.gallery-hero {
  padding: 30px 0 20px 0;
}

.gallery-intro {
  max-width: 900px;
}

/* FILTER */
.gallery-filter-menu {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
  margin-bottom: 30px;
}

.gallery-filter-btn {
  padding: 10px 16px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: var(--blanc-casse);
  box-shadow: var(--ombre-legere);
  font-weight: 600;
}

.gallery-filter-btn.active {
  background: var(--soleil);
}

/* GRID HOMOGENE */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}

.gallery-item {
  position: relative;
  height: 240px;
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--ombre-legere);
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

.gallery-item:hover img {
  transform: scale(1.05);
}

/* OVERLAY */
.gallery-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  padding: 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

.gallery-caption {
  color: white;
}

.gallery-caption span {
  font-size: 0.75rem;
  text-transform: uppercase;
  color: #f1e7c8;
}

.gallery-caption strong {
  display: block;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 3000;
}

.lightbox.active {
  display: flex;
}

.lightbox img {
  max-width: 90%;
  max-height: 80vh;
  border-radius: 12px;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: white;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="logo">La Musarde</a>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="maison.html">Maison</a>
      <a href="informations.html">Informations</a>
      <a href="galerie.html" class="active">Galerie photo</a>
      <a href="activites.html">Activités</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</div>

<main>

<section class="gallery-hero">
  <h1>Galerie photo</h1>

  <div class="gallery-filter-menu">
    <button class="gallery-filter-btn active" data-filter="all">Toutes</button>
    <button class="gallery-filter-btn" data-filter="exterieur">Extérieur</button>
    <button class="gallery-filter-btn" data-filter="dune">Dune</button>
    <button class="gallery-filter-btn" data-filter="pin">Pin</button>
    <button class="gallery-filter-btn" data-filter="kbane">Kbane</button>
  </div>
</section>

<section class="gallery-grid">

<!-- EXTERIEUR -->
<button class="gallery-item" data-category="exterieur" data-src="images/photos/musarde1.jpg">
  <img src="images/photos/musarde1.jpg">
  <div class="gallery-overlay"><div class="gallery-caption"><span>Extérieur</span><strong>Vue générale</strong></div></div>
</button>

<button class="gallery-item" data-category="exterieur" data-src="images/photos/musarde2.jpg">
  <img src="images/photos/musarde2.jpg">
</button>

<button class="gallery-item" data-category="exterieur" data-src="images/photos/musarde3.jpg">
  <img src="images/photos/musarde3.jpg">
</button>

<button class="gallery-item" data-category="exterieur" data-src="images/photos/musarde4.jpg">
  <img src="images/photos/musarde4.jpg">
</button>

<button class="gallery-item" data-category="exterieur" data-src="images/photos/musarde5.jpg">
  <img src="images/photos/musarde5.jpg">
</button>

<button class="gallery-item" data-category="exterieur" data-src="images/photos/musarde6.jpg">
  <img src="images/photos/musarde6.jpg">
</button>

<button class="gallery-item" data-category="exterieur" data-src="images/photos/musarde7.jpg">
  <img src="images/photos/musarde7.jpg">
</button>

<!-- DUNE -->
<button class="gallery-item" data-category="dune" data-src="images/photos/log1-1.png">
  <img src="images/photos/log1-1.png">
</button>

<button class="gallery-item" data-category="dune" data-src="images/photos/log1-2.PNG">
  <img src="images/photos/log1-2.PNG">
</button>

<!-- PIN -->
<button class="gallery-item" data-category="pin" data-src="images/photos/log2-1.png">
  <img src="images/photos/log2-1.png">
</button>

<!-- KBANE -->
<button class="gallery-item" data-category="kbane" data-src="images/photos/Kbane1.png">
  <img src="images/photos/Kbane1.png">
</button>

</section>

</main>

<footer>
  <div class="footer-inner">
    <p>© La Musarde – 1605 Rte de Bourruque 40160 YCHOUX</p>
    <p class="footer-signature">Landes • Forêt • Lacs • Océan</p>
  </div>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img">
</div>

<script>
const items = document.querySelectorAll('.gallery-item');
const lightbox = document.getElementById('lightbox');
const img = document.getElementById('lightbox-img');

items.forEach(item => {
  item.addEventListener('click', () => {
    img.src = item.dataset.src;
    lightbox.classList.add('active');
  });
});

function closeLightbox() {
  lightbox.classList.remove('active');
}

/* FILTER */
const buttons = document.querySelectorAll('.gallery-filter-btn');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter;

    items.forEach(item => {
      item.style.display =
        filter === "all" || item.dataset.category === filter
          ? "block"
          : "none";
    });
  });
});
</script>

</body>
</html>
